# ═══════════════════════════════════════════════════════════════════════════════
# PSD Cloud – Backing Services (PostgreSQL, Redis, NATS, MinIO, SonarQube, ZAP)
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Secrets ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: psd-cloud-secrets
  namespace: psd-cloud
type: Opaque
stringData:
  jwt-secret: "k8s-jwt-secret-change-in-production"
  db-password: "psd_secret"
  minio-access-key: "minioadmin"
  minio-secret-key: "minioadmin123"

---
# ─── ConfigMap ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: psd-cloud-config
  namespace: psd-cloud
data:
  DATABASE_URL: "postgresql+asyncpg://psd:psd_secret@postgres:5432/psd_cloud"
  NATS_URL: "nats://nats:4222"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "psd-reports"
  SONARQUBE_URL: "http://sonarqube:9000"
  ZAP_BASE_URL: "http://zap:8090"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_MINUTES: "60"

---
# ─── PostgreSQL PVC ──────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: psd-cloud
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
# ─── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: psd-cloud
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: psd_cloud
            - name: POSTGRES_USER
              value: psd
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: psd-cloud-secrets
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "psd", "-d", "psd_cloud"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: psd-cloud
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# ─── Redis ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: psd-cloud
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: psd-cloud
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# ─── NATS JetStream ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: psd-cloud
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["--jetstream", "--http_port", "8222"]
          ports:
            - containerPort: 4222
            - containerPort: 8222
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: psd-cloud
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222

---
# ─── MinIO (S3-compatible object storage) ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: psd-cloud
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: psd-cloud-secrets
                  key: minio-access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: psd-cloud-secrets
                  key: minio-secret-key
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: psd-cloud
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: psd-cloud
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - port: 9001
      targetPort: 9001
      nodePort: 30901

---
# ─── SonarQube (SAST engine) ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: psd-cloud
  labels:
    app: sonarqube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      containers:
        - name: sonarqube
          image: sonarqube:10.5-community
          ports:
            - containerPort: 9000
          env:
            - name: SONAR_ES_BOOTSTRAP_CHECKS_DISABLE
              value: "true"
            - name: SONAR_WEB_JAVAOPTS
              value: "-Xmx512m -Xms256m"
            - name: SONAR_CE_JAVAOPTS
              value: "-Xmx512m -Xms256m"
            - name: SONAR_SEARCH_JAVAOPTS
              value: "-Xmx1g -Xms512m -XX:MaxDirectMemorySize=256m"
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2", memory: "3Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube
  namespace: psd-cloud
spec:
  selector:
    app: sonarqube
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube-external
  namespace: psd-cloud
spec:
  type: NodePort
  selector:
    app: sonarqube
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30900

---
# ─── SonarQube Init (disable forced authentication) ─────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: sonarqube-init
  namespace: psd-cloud
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: sonarqube-init
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for SonarQube to be ready..."
              until curl -sf http://sonarqube:9000/api/system/status | grep -q '"status":"UP"'; do
                sleep 10
              done
              echo "SonarQube is up, configuring for local dev..."
              curl -sf -u admin:admin -X POST 'http://sonarqube:9000/api/settings/set?key=sonar.forceAuthentication&value=false'
              echo "Disabled force authentication."
              curl -sf -u admin:admin -X POST 'http://sonarqube:9000/api/permissions/add_group?groupName=Anyone&permission=scan'
              echo "Granted scan permission to Anyone."
              curl -sf -u admin:admin -X POST 'http://sonarqube:9000/api/permissions/add_group?groupName=Anyone&permission=provisioning'
              echo "Granted project creation permission to Anyone."
              echo "SonarQube init complete"
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }

---
# ─── OWASP ZAP (DAST engine) ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zap
  namespace: psd-cloud
  labels:
    app: zap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zap
  template:
    metadata:
      labels:
        app: zap
    spec:
      containers:
        - name: zap
          image: ghcr.io/zaproxy/zaproxy:stable
          command: ["zap.sh", "-daemon", "-host", "0.0.0.0", "-port", "8090",
                    "-config", "api.addrs.addr.name=.*",
                    "-config", "api.addrs.addr.regex=true",
                    "-config", "api.disablekey=true",
                    "-config", "scanner.threadPerHost=2"]
          env:
            - name: JAVA_OPTS
              value: "-Xmx512m"
          ports:
            - containerPort: 8090
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: zap
  namespace: psd-cloud
spec:
  selector:
    app: zap
  ports:
    - port: 8090
      targetPort: 8090

---
# ─── MinIO Init (create psd-reports bucket) ──────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: psd-cloud
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              until mc alias set local http://minio:9000 minioadmin minioadmin123 2>/dev/null; do
                sleep 5
              done
              mc mb --ignore-existing local/psd-reports
              mc anonymous set download local/psd-reports
              echo "MinIO init complete"
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }

---
# ─── Prometheus ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: psd-cloud
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: "api-gateway"
        static_configs:
          - targets: ["api-gateway:8000"]
        metrics_path: /metrics
      - job_name: "auth-service"
        static_configs:
          - targets: ["auth-service:8000"]
        metrics_path: /metrics
      - job_name: "scan-orchestrator"
        static_configs:
          - targets: ["scan-orchestrator:8000"]
        metrics_path: /metrics
      - job_name: "compliance-engine"
        static_configs:
          - targets: ["compliance-engine:8000"]
        metrics_path: /metrics
      - job_name: "report-generator"
        static_configs:
          - targets: ["report-generator:8000"]
        metrics_path: /metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: psd-cloud
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: psd-cloud
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-external
  namespace: psd-cloud
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090

---
# ─── Grafana ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: psd-cloud
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: psd-cloud
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: psd-cloud
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-external
  namespace: psd-cloud
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
