# ─── Compliance Engine ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-engine
  namespace: psd-cloud
  labels:
    app: compliance-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compliance-engine
  template:
    metadata:
      labels:
        app: compliance-engine
    spec:
      containers:
        - name: compliance-engine
          image: psd-cloud/compliance-engine:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: psd-cloud-config
          env:
            - name: ORCHESTRATOR_URL
              value: "http://scan-orchestrator:8000"
            - name: REPORT_GENERATOR_URL
              value: "http://report-generator:8000"
            - name: NOTIFICATION_URL
              value: "http://notification-service:8000"
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: compliance-engine
  namespace: psd-cloud
spec:
  selector:
    app: compliance-engine
  ports:
    - port: 8000
      targetPort: 8000

---
# ─── Report Generator ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-generator
  namespace: psd-cloud
  labels:
    app: report-generator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: report-generator
  template:
    metadata:
      labels:
        app: report-generator
    spec:
      containers:
        - name: report-generator
          image: psd-cloud/report-generator:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: psd-cloud-config
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: psd-cloud-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: psd-cloud-secrets
                  key: minio-secret-key
            - name: ORCHESTRATOR_URL
              value: "http://scan-orchestrator:8000"
            - name: NOTIFICATION_URL
              value: "http://notification-service:8000"
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: report-generator
  namespace: psd-cloud
spec:
  selector:
    app: report-generator
  ports:
    - port: 8000
      targetPort: 8000

