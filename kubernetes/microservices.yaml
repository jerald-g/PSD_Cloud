# ═══════════════════════════════════════════════════════════════════════════════
# PSD Cloud – Application Microservices
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Auth Service ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: psd-cloud
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: psd-cloud/auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: psd-cloud-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: psd-cloud-secrets
                  key: jwt-secret
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "250m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: psd-cloud
spec:
  selector:
    app: auth-service
  ports:
    - port: 8000
      targetPort: 8000

