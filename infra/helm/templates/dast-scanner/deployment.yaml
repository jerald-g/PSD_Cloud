apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dast-scanner
  namespace: {{ .Values.global.namespace }}
  labels:
    app: dast-scanner
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.dastScanner.replicaCount }}
  selector:
    matchLabels:
      app: dast-scanner
  template:
    metadata:
      labels:
        app: dast-scanner
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: dast-scanner
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.dastScanner.image.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.global.database.username }}:$(DB_PASSWORD)@{{ .Release.Name }}-postgresql:{{ .Values.global.database.port }}/{{ .Values.global.database.name }}"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: db-password
            - name: NATS_URL
              value: {{ .Values.global.nats.url | quote }}
          resources:
            {{- toYaml .Values.dastScanner.resources | nindent 12 }}
