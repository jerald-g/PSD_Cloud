apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-scan-orchestrator
  namespace: {{ .Values.global.namespace }}
  labels:
    app: scan-orchestrator
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.scanOrchestrator.replicaCount }}
  selector:
    matchLabels:
      app: scan-orchestrator
  template:
    metadata:
      labels:
        app: scan-orchestrator
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: scan-orchestrator
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.scanOrchestrator.image.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.global.database.username }}:$(DB_PASSWORD)@{{ .Release.Name }}-postgresql:{{ .Values.global.database.port }}/{{ .Values.global.database.name }}"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: db-password
            - name: NATS_URL
              value: {{ .Values.global.nats.url | quote }}
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379/0"
          resources:
            {{- toYaml .Values.scanOrchestrator.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-scan-orchestrator
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: scan-orchestrator
  ports:
    - port: {{ .Values.scanOrchestrator.service.port }}
      targetPort: 8000
  type: {{ .Values.scanOrchestrator.service.type }}
