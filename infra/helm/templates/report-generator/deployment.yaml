apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-report-generator
  namespace: {{ .Values.global.namespace }}
  labels:
    app: report-generator
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.reportGenerator.replicaCount }}
  selector:
    matchLabels:
      app: report-generator
  template:
    metadata:
      labels:
        app: report-generator
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: report-generator
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.reportGenerator.image.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.global.database.username }}:$(DB_PASSWORD)@{{ .Release.Name }}-postgresql:{{ .Values.global.database.port }}/{{ .Values.global.database.name }}"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: db-password
            - name: NATS_URL
              value: {{ .Values.global.nats.url | quote }}
            - name: MINIO_ENDPOINT
              value: {{ .Values.global.minio.endpoint | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.global.minio.bucket | quote }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: minio-secret-key
            - name: ORCHESTRATOR_URL
              value: "http://{{ .Release.Name }}-scan-orchestrator:8000"
            - name: NOTIFICATION_URL
              value: "http://{{ .Release.Name }}-notification-service:8000"
          resources:
            {{- toYaml .Values.reportGenerator.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-report-generator
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: report-generator
  ports:
    - port: 8000
      targetPort: 8000
