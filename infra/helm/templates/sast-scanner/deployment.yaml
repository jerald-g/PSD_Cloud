apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-sast-scanner
  namespace: {{ .Values.global.namespace }}
  labels:
    app: sast-scanner
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.sastScanner.replicaCount }}
  selector:
    matchLabels:
      app: sast-scanner
  template:
    metadata:
      labels:
        app: sast-scanner
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: sast-scanner
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.sastScanner.image.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.global.database.username }}:$(DB_PASSWORD)@{{ .Release.Name }}-postgresql:{{ .Values.global.database.port }}/{{ .Values.global.database.name }}"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: db-password
            - name: NATS_URL
              value: {{ .Values.global.nats.url | quote }}
          resources:
            {{- toYaml .Values.sastScanner.resources | nindent 12 }}
