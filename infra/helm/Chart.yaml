apiVersion: v2
name: psd-cloud
description: PSD Cloud Security Platform – multi-tenant cloud-native security scanning and compliance platform
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - security
  - compliance
  - SAST
  - DAST
  - OWASP
  - cloud-native
  - microservices
home: https://gitlab.com/Gerald-codes1/psd-cloud
maintainers:
  - name: PSD Cloud Team

dependencies:
  - name: postgresql
    version: "15.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "19.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: nats
    version: "1.x.x"
    repository: "https://nats-io.github.io/k8s/helm/charts"
    condition: nats.enabled
  - name: minio
    version: "14.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: minio.enabled
  - name: kube-prometheus-stack
    version: "58.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: monitoring.enabled
