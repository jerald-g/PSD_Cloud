# PSD Cloud Security Platform – Helm Values
# Override these values in a values-<env>.yaml file per environment.

global:
  imageRegistry: ""           # Set to your container registry, e.g. registry.gitlab.com/Gerald-codes1/psd-cloud
  imageTag: "latest"
  imagePullPolicy: IfNotPresent
  namespace: psd-cloud

  # Shared secrets – override via external secret manager in production
  jwtSecret: "CHANGE_ME_IN_PRODUCTION"

  database:
    host: ""          # Leave empty to use bundled PostgreSQL chart
    port: 5432
    name: psd_cloud
    username: psd
    existingSecret: ""        # k8s secret name containing DB_PASSWORD

  nats:
    url: "nats://nats:4222"

  minio:
    endpoint: "minio:9000"
    bucket: psd-reports
    existingSecret: ""        # k8s secret with MINIO_ACCESS_KEY / MINIO_SECRET_KEY

# ─── Backing Services (disable if using managed cloud services) ─────────────

postgresql:
  enabled: true
  auth:
    database: psd_cloud
    username: psd
    password: "psd_secret_change_me"
  primary:
    persistence:
      size: 20Gi

redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      size: 2Gi

nats:
  enabled: true
  config:
    jetstream:
      enabled: true

minio:
  enabled: true
  auth:
    rootUser: minioadmin
    rootPassword: "minioadmin123_change_me"
  defaultBuckets: psd-reports
  persistence:
    size: 20Gi

monitoring:
  enabled: true

# ─── Microservices ───────────────────────────────────────────────────────────

apiGateway:
  replicaCount: 2
  image:
    repository: api-gateway
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: true
    className: nginx
    host: psd-cloud.example.com
    tls: []

authService:
  replicaCount: 2
  image:
    repository: auth-service
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "250m", memory: "256Mi" }
  service:
    type: ClusterIP
    port: 8000

scanOrchestrator:
  replicaCount: 2
  image:
    repository: scan-orchestrator
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }
  service:
    type: ClusterIP
    port: 8000

sastScanner:
  replicaCount: 2
  image:
    repository: sast-scanner
  resources:
    requests: { cpu: "500m", memory: "512Mi" }
    limits:   { cpu: "2",    memory: "2Gi" }

dastScanner:
  replicaCount: 1
  image:
    repository: dast-scanner
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }

complianceEngine:
  replicaCount: 2
  image:
    repository: compliance-engine
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }

reportGenerator:
  replicaCount: 2
  image:
    repository: report-generator
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

notificationService:
  replicaCount: 1
  image:
    repository: notification-service
  resources:
    requests: { cpu: "50m",  memory: "64Mi" }
    limits:   { cpu: "200m", memory: "128Mi" }

dashboard:
  replicaCount: 2
  image:
    repository: dashboard
  resources:
    requests: { cpu: "50m",  memory: "64Mi" }
    limits:   { cpu: "200m", memory: "128Mi" }
  service:
    type: ClusterIP
    port: 80
